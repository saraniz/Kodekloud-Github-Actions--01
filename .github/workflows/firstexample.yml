name: My First Workflow

on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repo
          uses: actions/checkout@v6

        - name: List and Read File
          run: |
            echo "My first Github Actions Job" 
            ls -ltra
            cat README.md

        - name: List repo files
          run: ls -ltra

        - name: Excuting shell script
          run: |
            chmod +x ascii-script.sh
            ./ascii-script.sh